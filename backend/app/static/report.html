<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleet Trips - Reports</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #f8fafc;
            --panel: #ffffff;
            --panel-2: #f4f8fd;
            --line: #d9e2ef;
            --text: #0f172a;
            --muted: #64748b;
            --primary: #00499e;
            --secondary: #0e9849;
            --primary-soft: #eaf4ff;
            --secondary-soft: #e9f9f0;
            --amber: #f59e0b;
            --red: #dc2626;
        }
        body.dark {
            --bg: #0f172a;
            --panel: #111827;
            --panel-2: #162033;
            --line: #253244;
            --text: #e5e7eb;
            --muted: #94a3b8;
            --primary-soft: #0f2747;
            --secondary-soft: #0d2e1c;
        }
        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        button, select, input { font: inherit; }
        .layout { min-height: 100vh; display: flex; }
        .sidebar {
            position: fixed;
            inset: 0 auto 0 0;
            width: 272px;
            background: var(--primary);
            color: #ffffff;
            display: flex;
            flex-direction: column;
        }
        .brand {
            min-height: 72px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.16);
        }
        .brand-mark {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: #ffffff;
            display: grid;
            place-items: center;
            overflow: hidden;
        }
        .brand-mark img { width: 32px; height: 32px; display: block; }
        .brand-title { font-weight: 800; line-height: 1.1; }
        .brand-subtitle { color: rgba(255, 255, 255, 0.78); font-size: 12px; margin-top: 2px; }
        .nav { padding: 12px; display: grid; gap: 4px; }
        .nav a {
            color: rgba(255, 255, 255, 0.78);
            text-decoration: none;
            border-radius: 8px;
            padding: 11px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .nav a:hover { background: rgba(255, 255, 255, 0.1); color: #ffffff; }
        .nav a.active { background: #ffffff; color: var(--primary); font-weight: 800; }
        .icon { width: 18px; height: 18px; stroke-width: 2; flex: 0 0 auto; }
        .main {
            width: 100%;
            min-width: 0;
            margin-left: 272px;
            padding: 24px;
        }
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 20px;
        }
        .page-title { font-size: 24px; font-weight: 900; }
        .page-subtitle { color: var(--muted); font-size: 13px; margin-top: 3px; }
        .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        select, input {
            min-height: 40px;
            border: 1px solid var(--line);
            background: var(--panel);
            color: var(--text);
            border-radius: 8px;
            padding: 8px 10px;
        }
        .btn {
            min-height: 40px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            color: var(--text);
            padding: 8px 12px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn.primary { background: var(--primary); border-color: var(--primary); color: #ffffff; }
        .mode-badge {
            min-height: 40px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 7px 10px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            color: var(--muted);
            max-width: 420px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .mode-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--secondary); }
        .mode-badge.demo .mode-dot { background: var(--amber); }
        .mode-badge.warning .mode-dot { background: var(--red); }
        .grid {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 14px;
            margin-bottom: 20px;
        }
        .card, .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
        }
        .card { padding: 16px; min-height: 104px; min-width: 0; }
        .card-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .card-icon { width: 32px; height: 32px; border-radius: 8px; display: grid; place-items: center; background: var(--primary-soft); color: var(--primary); }
        .card-label { color: var(--muted); font-size: 12px; text-transform: uppercase; }
        .card-value { font-size: 22px; font-weight: 900; margin-top: 9px; overflow-wrap: anywhere; }
        .green { color: var(--secondary); }
        .red { color: var(--red); }
        .blue { color: var(--primary); }
        .panel { overflow: hidden; margin-bottom: 20px; }
        .panel-header {
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            border-bottom: 1px solid var(--line);
        }
        .panel-title { font-weight: 900; }
        .panel-subtitle { color: var(--muted); font-size: 12px; margin-top: 2px; }
        .tabs { display: flex; gap: 8px; flex-wrap: wrap; padding: 14px 16px; border-bottom: 1px solid var(--line); }
        .tab {
            border: 1px solid var(--line);
            background: var(--panel);
            color: var(--muted);
            border-radius: 8px;
            min-height: 38px;
            padding: 8px 12px;
            cursor: pointer;
        }
        .tab.active { background: var(--primary); color: #ffffff; border-color: var(--primary); }
        .filter-bar {
            display: grid;
            grid-template-columns: 1.1fr minmax(220px, 1fr) 0.8fr 0.8fr 0.8fr 0.8fr auto auto auto;
            gap: 10px;
            padding: 14px 16px;
            border-bottom: 1px solid var(--line);
            background: var(--panel-2);
        }
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 860px; }
        th, td { padding: 12px 14px; border-bottom: 1px solid var(--line); text-align: left; font-size: 13px; }
        th { color: var(--muted); font-size: 11px; text-transform: uppercase; background: var(--panel-2); }
        tr:hover td { background: rgba(0, 73, 158, 0.04); }
        .pill {
            display: inline-flex;
            align-items: center;
            min-height: 24px;
            padding: 3px 9px;
            border-radius: 999px;
            border: 1px solid var(--line);
            color: var(--muted);
            white-space: nowrap;
            font-size: 12px;
        }
        .pill.good { color: var(--secondary); border-color: rgba(14, 152, 73, 0.32); background: var(--secondary-soft); }
        .pill.info { color: var(--primary); border-color: rgba(0, 73, 158, 0.32); background: var(--primary-soft); }
        .empty { padding: 36px 16px; text-align: center; color: var(--muted); }
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            padding: 14px 16px;
            border-bottom: 1px solid var(--line);
            background: var(--panel);
        }
        .summary-card {
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 14px;
            background: var(--panel-2);
            min-height: 96px;
        }
        .summary-title { color: var(--muted); font-size: 12px; text-transform: uppercase; }
        .summary-value { font-size: 22px; font-weight: 900; margin-top: 8px; }
        .location-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
            padding: 14px 16px;
            border-bottom: 1px solid var(--line);
        }
        .location-card {
            position: relative;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 14px;
            background: var(--panel);
        }
        .location-name { font-weight: 900; }
        .location-count { font-size: 26px; font-weight: 900; color: var(--primary); margin-top: 8px; }
        .location-meta { color: var(--muted); font-size: 12px; margin-top: 4px; }
        .location-tooltip {
            display: none;
            position: absolute;
            z-index: 10;
            left: 12px;
            right: 12px;
            top: calc(100% - 8px);
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: 0 12px 28px rgba(15, 23, 42, 0.18);
            padding: 10px;
            color: var(--text);
            font-size: 12px;
        }
        .location-card:hover .location-tooltip { display: block; }
        .share-report {
            margin: 14px 16px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            padding: 16px;
        }
        .share-title { font-weight: 900; margin-bottom: 10px; }
        .share-text {
            width: 100%;
            min-height: 160px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel-2);
            color: var(--text);
            padding: 10px;
            resize: vertical;
            font: inherit;
        }
        .report-sheet {
            margin: 14px 16px;
            border: 1px solid #111827;
            background: #ffffff;
            color: #111827;
            overflow-x: auto;
        }
        .report-sheet-header {
            padding: 14px 16px 10px;
            text-align: center;
            border-bottom: 1px solid #111827;
        }
        .report-sheet-title {
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
        }
        .report-sheet-date {
            margin-top: 4px;
            font-size: 13px;
            font-weight: 700;
        }
        .exact-report-table {
            width: 100%;
            min-width: 1160px;
            border-collapse: collapse;
        }
        .exact-report-table th,
        .exact-report-table td {
            border: 1px solid #111827;
            padding: 8px 9px;
            color: #111827;
            background: #ffffff;
            vertical-align: top;
            font-size: 12px;
        }
        .exact-report-table th {
            text-align: center;
            font-weight: 900;
            text-transform: none;
            white-space: normal;
        }
        .exact-report-table td.number-cell,
        .exact-report-table th.number-cell {
            text-align: right;
            white-space: nowrap;
        }
        .exact-report-table .total-row td {
            font-weight: 900;
            background: #f8fafc;
        }
        .daily-report-actions {
            margin: 0 16px 14px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            flex-wrap: wrap;
        }
        @media (max-width: 1180px) {
            .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .summary-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 860px) {
            .sidebar { position: static; width: 100%; min-height: auto; }
            .layout { display: block; }
            .main { margin-left: 0; padding: 16px; }
            .topbar { align-items: flex-start; flex-direction: column; }
            .grid { grid-template-columns: 1fr; }
            .filter-bar { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-mark"><img src="/static/fleet-trips-logo.svg" alt="Fleet Trips"></div>
                <div>
                    <div class="brand-title">Fleet Trips</div>
                    <div class="brand-subtitle">Reports</div>
                </div>
            </div>
            <nav class="nav">
                <a href="/"><i data-lucide="layout-dashboard" class="icon"></i>Dashboard</a>
                <a href="/report.html" class="active"><i data-lucide="file-bar-chart" class="icon"></i>Reports</a>
                <a href="/report.html#payment-requests"><i data-lucide="credit-card" class="icon"></i>Payments</a>
            </nav>
        </aside>

        <main class="main">
            <div class="topbar">
                <div>
                    <h1 class="page-title">Fleet Reports</h1>
                    <div class="page-subtitle">Current location, payment requests, and income statement</div>
                </div>
                <div class="controls">
                    <div class="mode-badge" id="mode-badge"><span class="mode-dot"></span><span id="mode-label">Live DB</span></div>
                    <select id="mode-select" aria-label="Data source">
                        <option value="live">Live DB</option>
                        <option value="demo">Demo DB</option>
                    </select>
                    <button class="btn" id="theme-toggle" type="button"><i data-lucide="moon" class="icon"></i><span id="theme-label">Dark</span></button>
                </div>
            </div>

            <!-- KPI cards removed per request - clean list + details layout -->

            <section class="panel">
                <div class="panel-header">
                    <div>
                        <div class="panel-title">Reports</div>
                        <div class="panel-subtitle" id="report-subtitle">Live report data</div>
                    </div>
                </div>
                <div class="tabs">
                    <button class="tab active" data-report="current-location"><i data-lucide="map-pin" class="icon"></i>Current Location</button>
                    <button class="tab" data-report="location-summary"><i data-lucide="map-pinned" class="icon"></i>Location Summary</button>
                    <button class="tab" data-report="payment-requests"><i data-lucide="credit-card" class="icon"></i>Payment Requests</button>
                    <button class="tab" data-report="finance-summary"><i data-lucide="chart-no-axes-combined" class="icon"></i>Finance Summary</button>
                    <button class="tab" data-report="daily-profit"><i data-lucide="message-square-text" class="icon"></i>Daily Profit</button>
                    <button class="tab" data-report="income-statement"><i data-lucide="receipt-text" class="icon"></i>Income Statement</button>
                    <button class="tab" data-report="trip-register"><i data-lucide="route" class="icon"></i>Trip Register</button>
                </div>
                <div class="filter-bar">
                    <select id="report-select" aria-label="Report type">
                        <option value="current-location">Current Location</option>
                        <option value="location-summary">Location Summary</option>
                        <option value="payment-requests">Payment Requests</option>
                        <option value="finance-summary">Finance Summary</option>
                        <option value="daily-profit">Daily Profit</option>
                        <option value="income-statement">Income Statement</option>
                        <option value="trip-register">Trip Register</option>
                    </select>
                    <input id="report-search" type="search" placeholder="Search report rows">
                    <select id="status-filter" aria-label="Trip status">
                        <option value="all">Any status</option>
                        <option value="draft">Draft</option>
                        <option value="available">Available</option>
                        <option value="assigned">Assigned</option>
                        <option value="dispatched">Dispatched</option>
                        <option value="done">Done</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                    <select id="payment-status-filter" aria-label="Payment status">
                        <option value="all">Any payment</option>
                        <option value="pending">Pending</option>
                        <option value="paid">Paid</option>
                        <option value="approved">Approved</option>
                        <option value="confirmed">Confirmed</option>
                        <option value="draft">Draft</option>
                    </select>
                    <select id="period-filter" aria-label="Report period">
                        <option value="daily">Daily</option>
                        <option value="weekly">Weekly</option>
                        <option value="monthly">Monthly</option>
                    </select>
                    <input id="from-date-filter" type="date" aria-label="Start date">
                    <input id="to-date-filter" type="date" aria-label="End date">
                    <button class="btn primary" id="generate-report" type="button"><i data-lucide="play" class="icon"></i>Generate</button>
                    <button class="btn" id="copy-whatsapp" type="button"><i data-lucide="copy" class="icon"></i>Copy</button>
                    <button class="btn" id="export-excel" type="button"><i data-lucide="file-spreadsheet" class="icon"></i>Excel</button>
                </div>
                <div id="visual-report"></div>
                <div class="table-wrap"><table id="report-table"></table></div>
            </section>
        </main>
    </div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script>
        const API_BASE = '/api';
        let currentMode = localStorage.getItem('fleetDashboardMode') || 'live';
        let currentReport = 'daily-profit';
        if (window.location.hash === '#payment-requests') {
            currentReport = 'payment-requests';
            window.location.hash = '';
        }
        let currentTheme = localStorage.getItem('fleetTheme') || 'light';
        let exportHeaders = [];
        let exportRows = [];
        let dashboardData = {};
        let reportData = {
            currentLocation: [],
            currentLocationSummary: { locations: [] },
            paymentRequests: [],
            financeSummary: { periods: [], totals: {} },
            dailyProfit: { rows: [], totals: {} },
            incomeStatement: {},
        };

        const $ = (id) => document.getElementById(id);
        const clean = (value) => String(value ?? '').replace(/[&<>"']/g, (char) => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[char]));
        const money = (value) => new Intl.NumberFormat('en-ET', {
            style: 'currency',
            currency: 'ETB',
            maximumFractionDigits: 0,
        }).format(Number(value || 0));
        const amount = (value) => new Intl.NumberFormat('en-ET', {
            maximumFractionDigits: 2,
        }).format(Number(value || 0));

        function refreshIcons() {
            if (window.lucide) window.lucide.createIcons();
        }

        function applyTheme() {
            document.body.classList.toggle('dark', currentTheme === 'dark');
            $('theme-label').textContent = currentTheme === 'dark' ? 'Light' : 'Dark';
            $('theme-toggle').innerHTML = `<i data-lucide="${currentTheme === 'dark' ? 'sun' : 'moon'}" class="icon"></i><span id="theme-label">${currentTheme === 'dark' ? 'Light' : 'Dark'}</span>`;
            refreshIcons();
        }

        function updateModeBadge(mode, warning) {
            const badge = $('mode-badge');
            badge.classList.toggle('demo', mode === 'demo');
            badge.classList.toggle('warning', Boolean(warning));
            $('mode-label').textContent = warning || (mode === 'demo' ? 'Demo DB' : 'Live DB');
            $('mode-label').title = warning || '';
        }

        async function fetchJson(url) {
            const response = await fetch(url);
            if (!response.ok) {
                const body = await response.json().catch(() => ({}));
                throw new Error(body.detail || `Request failed (${response.status})`);
            }
            return response.json();
        }

        async function loadReports() {
            $('mode-select').value = currentMode;
            updateModeBadge(currentMode, 'Loading...');
            try {
                dashboardData = await fetchJson(`${API_BASE}/dashboard/full?mode=${encodeURIComponent(currentMode)}`);
                if (currentMode === 'live') {
                    const [currentLocation, currentLocationSummary, paymentRequests, financeSummary, dailyProfit, incomeStatement] = await Promise.all([
                        fetchJson(`${API_BASE}/reports/current-location`),
                        fetchJson(`${API_BASE}/reports/current-location-summary`),
                        fetchJson(`${API_BASE}/reports/payment-requests`),
                        fetchFinanceSummary(),
                        fetchDailyProfit(),
                        fetchJson(`${API_BASE}/reports/income-statement`),
                    ]);
                    reportData = { currentLocation, currentLocationSummary, paymentRequests, financeSummary, dailyProfit, incomeStatement };
                } else {
                    reportData = buildDemoReports(dashboardData);
                }
                updateModeBadge(dashboardData._mode || currentMode, dashboardData._warning || '');
                renderAll();
            } catch (error) {
                dashboardData = {};
                reportData = { currentLocation: [], currentLocationSummary: { locations: [] }, paymentRequests: [], financeSummary: { periods: [], totals: {} }, dailyProfit: { rows: [], totals: {} }, incomeStatement: {} };
                updateModeBadge(currentMode, error.message || 'Load failed');
                renderAll();
            }
        }

        function financeSummaryUrl() {
            const params = new URLSearchParams({ period: $('period-filter').value });
            if ($('from-date-filter').value) params.set('from_date', $('from-date-filter').value);
            if ($('to-date-filter').value) params.set('to_date', $('to-date-filter').value);
            return `${API_BASE}/reports/finance-summary?${params.toString()}`;
        }

        function dailyProfitUrl() {
            const params = new URLSearchParams();
            const reportDate = $('from-date-filter').value || $('to-date-filter').value;
            if (reportDate) params.set('report_date', reportDate);
            const query = params.toString();
            return `${API_BASE}/reports/daily-profit${query ? `?${query}` : ''}`;
        }

        async function fetchFinanceSummary() {
            return fetchJson(financeSummaryUrl());
        }

        async function fetchDailyProfit() {
            return fetchJson(dailyProfitUrl());
        }

        async function refreshFinanceSummary() {
            if (currentMode !== 'live') return;
            updateModeBadge(currentMode, 'Loading report...');
            reportData.financeSummary = await fetchFinanceSummary();
            updateModeBadge(dashboardData._mode || currentMode, dashboardData._warning || '');
            renderAll();
        }

        async function refreshDailyProfit() {
            if (currentMode !== 'live') {
                const trips = Array.isArray(dashboardData.recent_journeys) ? dashboardData.recent_journeys : [];
                reportData.dailyProfit = buildDemoDailyProfit(trips);
                renderAll();
                return;
            }
            updateModeBadge(currentMode, 'Loading report...');
            reportData.dailyProfit = await fetchDailyProfit();
            updateModeBadge(dashboardData._mode || currentMode, dashboardData._warning || '');
            renderAll();
        }

        function buildDemoReports(data) {
            const trips = Array.isArray(data.recent_journeys) ? data.recent_journeys : [];
            return {
                currentLocation: trips.map((trip) => ({
                    trip_id: trip.id,
                    reference: trip.id,
                    vehicle_plate: trip.vehicle_plate,
                    driver_name: trip.driver_name,
                    departure_name: trip.origin,
                    destination_name: Array.isArray(trip.destinations) ? trip.destinations.join(', ') : '',
                    current_location_name: Array.isArray(trip.destinations) ? trip.destinations[0] : '',
                    current_location_note: trip.status,
                    departure_date: trip.departure_date,
                    arrival_date: trip.return_date,
                    state: trip.status,
                    current_location_days: 0,
                })),
                currentLocationSummary: buildDemoLocationSummary(trips),
                paymentRequests: trips.map((trip) => ({
                    id: trip.id,
                    name: trip.id,
                    trip_reference: trip.id,
                    vehicle_plate: trip.vehicle_plate,
                    state: trip.pending_expense_payment ? 'pending' : 'paid',
                    date: trip.departure_date,
                    total_amount: trip.payment_request_total || trip.total_expense,
                })),
                incomeStatement: {
                    trip_count: trips.length,
                    revenue_total: data.total_revenue || 0,
                    expense_total: data.total_expense || 0,
                    profit: data.total_profit || 0,
                    receivable_count: data.payment_summary?.receivable_trip_count || trips.length,
                    payment_request_count: data.payment_summary?.payment_request_trip_count || trips.length,
                },
                financeSummary: buildDemoFinanceSummary(trips),
                dailyProfit: buildDemoDailyProfit(trips),
            };
        }

        function buildDemoLocationSummary(trips) {
            const grouped = trips.reduce((acc, trip) => {
                const location = (Array.isArray(trip.destinations) ? trip.destinations[0] : trip.destination) || trip.current_location || 'Unknown';
                if (!acc[location]) acc[location] = { location_name: location, vehicle_count: 0, vehicles: [] };
                acc[location].vehicle_count += 1;
                acc[location].vehicles.push({
                    reference: trip.id,
                    vehicle_plate: trip.vehicle_plate,
                    driver_name: trip.driver_name,
                    state: trip.status,
                    destination_name: location,
                    days: 0,
                });
                return acc;
            }, {});
            return { locations: Object.values(grouped), total_locations: Object.keys(grouped).length, total_vehicles: trips.length };
        }

        function buildDemoFinanceSummary(trips) {
            const grouped = trips.reduce((acc, trip) => {
                const key = String(trip.departure_date || new Date().toISOString()).slice(0, 10);
                if (!acc[key]) acc[key] = { period_start: key, trip_count: 0, revenue_total: 0, expense_total: 0, profit: 0 };
                acc[key].trip_count += 1;
                acc[key].revenue_total += Number(trip.total_revenue || 0);
                acc[key].expense_total += Number(trip.total_expense || 0);
                acc[key].profit = acc[key].revenue_total - acc[key].expense_total;
                return acc;
            }, {});
            const periods = Object.values(grouped);
            return {
                period: $('period-filter').value,
                periods,
                totals: {
                    trip_count: periods.reduce((sum, row) => sum + row.trip_count, 0),
                    revenue_total: periods.reduce((sum, row) => sum + row.revenue_total, 0),
                    expense_total: periods.reduce((sum, row) => sum + row.expense_total, 0),
                    profit: periods.reduce((sum, row) => sum + row.profit, 0),
                },
            };
        }

        function dailyProfitTotals(rows) {
            return {
                vehicle_count: rows.length,
                rent_total: rows.reduce((sum, row) => sum + Number(row.rent_amount || 0), 0),
                cost_total: rows.reduce((sum, row) => sum + Number(row.daily_total_cost || 0), 0),
                revenue_total: rows.reduce((sum, row) => sum + Number(row.actual_daily_total_revenue || 0), 0),
                net_profit_total: rows.reduce((sum, row) => sum + Number(row.actual_net_profit || 0), 0),
                daily_net_profit_total: rows.reduce((sum, row) => sum + Number(row.daily_net_profit || 0), 0),
            };
        }

        function buildDemoDailyProfit(trips) {
            const requestedDate = $('from-date-filter').value || $('to-date-filter').value;
            let selectedTrips = trips;
            let reportDate = requestedDate;
            if (requestedDate) {
                selectedTrips = trips.filter((trip) => String(trip.departure_date || '').slice(0, 10) === requestedDate);
            } else if (trips.length) {
                reportDate = trips.map((trip) => String(trip.departure_date || '').slice(0, 10)).sort().reverse()[0];
                selectedTrips = trips.filter((trip) => String(trip.departure_date || '').slice(0, 10) === reportDate);
            }
            const rows = selectedTrips.map((trip, index) => {
                const revenue = Number(trip.total_revenue || 0);
                const cost = Number(trip.total_expense || trip.payment_request_total || 0);
                const profit = Math.max(0, revenue - cost);
                const destination = Array.isArray(trip.destinations) ? trip.destinations.join(', ') : (trip.destination || 'Destination');
                return {
                    no: index + 1,
                    driver_name: trip.driver_name || 'Unassigned',
                    plate_number: trip.vehicle_plate || 'N/A',
                    rent_amount: revenue,
                    daily_total_cost: cost,
                    actual_daily_total_revenue: revenue,
                    actual_net_profit: profit,
                    daily_net_profit: profit,
                    remarks: `Vehicle rental revenue from ${trip.origin || 'TOP Factory'}-${destination}`,
                    trip_id: trip.id,
                    report_date: String(trip.departure_date || reportDate || '').slice(0, 10),
                };
            });
            return { report_date: reportDate, rows, totals: dailyProfitTotals(rows) };

        function reportRow(cells, status, paymentState, searchText) {
            return { cells, status: normalizeStatus(status), paymentStatus: paymentState || '', searchText: String(searchText || '').toLowerCase() };
        }

        function normalizeStatus(status) {
            const raw = String(status || '').toLowerCase();
            const map = {
                planned: 'available',
                in_progress: 'dispatched',
                completed: 'done',
                cancel: 'cancelled',
                canceled: 'cancelled',
            };
            return map[raw] || raw;
        }

        function paymentStatus(state) {
            const normalized = normalizeStatus(state);
            if (['paid', 'posted', 'done'].includes(normalized)) return 'paid';
            if (['approved'].includes(normalized)) return 'approved';
            if (['confirmed'].includes(normalized)) return 'confirmed';
            if (['draft'].includes(normalized)) return 'draft';
            return normalized || 'pending';
        }

        function statePill(state) {
            const normalized = String(state || 'unknown').replace('_', ' ');
            const good = ['done', 'approved', 'paid', 'posted', 'confirmed'].includes(String(state || '').toLowerCase());
            return { html: `<span class="pill ${good ? 'good' : 'info'}">${clean(normalized)}</span>` };
        }

        async function copyText(text) {
            if (navigator.clipboard && window.isSecureContext) {
                await navigator.clipboard.writeText(text);
                updateModeBadge(dashboardData._mode || currentMode, 'Copied report text');
                setTimeout(() => updateModeBadge(dashboardData._mode || currentMode, dashboardData._warning || ''), 1200);
                return;
            }
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.focus();
            textarea.select();
            document.execCommand('copy');
            textarea.remove();
            updateModeBadge(dashboardData._mode || currentMode, 'Copied report text');
            setTimeout(() => updateModeBadge(dashboardData._mode || currentMode, dashboardData._warning || ''), 1200);
        }

        function downloadText(filename, text) {
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            link.remove();
            URL.revokeObjectURL(url);
        }

        function downloadDailyExcel(report) {
            const rows = report.rows || [];
            const totals = report.totals || {};
            const tableRows = [
                ['No', 'Name of drivers', 'Plate no', 'Rent amount', 'Daily total cost', 'Actual daily total revenue', 'Actual Net profit', 'Daily net profit', 'Remarks'],
                ...rows.map((row) => [
                    row.no,
                    row.driver_name || 'Unassigned',
                    row.plate_number || 'N/A',
                    row.rent_amount || 0,
                    row.daily_total_cost || 0,
                    row.actual_daily_total_revenue || 0,
                    row.actual_net_profit || 0,
                    row.daily_net_profit || 0,
                    row.remarks || '',
                ]),
                ['', 'Total', '', totals.rent_total || 0, totals.cost_total || 0, totals.revenue_total || 0, totals.net_profit_total || 0, totals.daily_net_profit_total || 0, 'Total Daily Profit'],
            ];
            const html = `
                <html><head><meta charset="UTF-8"></head><body>
                <table>${tableRows.map((row) => `<tr>${row.map((cell) => `<td>${clean(cell)}</td>`).join('')}</tr>`).join('')}</table>
                </body></html>
            `;
            const blob = new Blob([html], { type: 'application/vnd.ms-excel' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `daily-profit-${report.report_date || new Date().toISOString().slice(0, 10)}.xls`;
            document.body.appendChild(link);
            link.click();
            link.remove();
            URL.revokeObjectURL(url);
        }

        function renderTable(headers, rows) {
            const normalizedRows = rows.map((row) => Array.isArray(row) ? reportRow(row, '', '', row.join(' ')) : row);
            const statusFilter = $('status-filter').value;
            const paymentFilter = $('payment-status-filter').value;
            const query = $('report-search').value.trim().toLowerCase();
            const filteredRows = normalizedRows.filter((row) => {
                if (currentReport === 'income-statement') return true;
                const statusOk = statusFilter === 'all' || row.status === statusFilter;
                const paymentOk = paymentFilter === 'all' || row.paymentStatus === paymentFilter;
                const searchOk = !query || row.searchText.includes(query) || row.cells.map((cell) => cell && cell.html ? cell.html : String(cell ?? '')).join(' ').toLowerCase().includes(query);
                return statusOk && paymentOk && searchOk;
            });
            exportHeaders = headers;
            exportRows = filteredRows.map((row) => row.cells.map((cell) => cell && cell.html ? cell.html.replace(/<[^>]+>/g, '') : String(cell ?? '')));
            if (!filteredRows.length) {
                $('report-table').innerHTML = `<tbody><tr><td class="empty">No records.</td></tr></tbody>`;
                return;
            }
            $('report-table').innerHTML = `
                <thead><tr>${headers.map((head) => `<th>${clean(head)}</th>`).join('')}</tr></thead>
                <tbody>${filteredRows.map((row) => `<tr>${row.cells.map((cell) => `<td>${cell && cell.html ? cell.html : clean(cell)}</td>`).join('')}</tr>`).join('')}</tbody>
            `;
        }

        });

        $('report-select').addEventListener('change', (event) => {
            currentReport = event.target.value;
            renderAll();
        });

        $('generate-report').addEventListener('click', () => {
            if (currentReport === 'finance-summary') {
                refreshFinanceSummary().catch((error) => {
                    updateModeBadge(currentMode, error.message || 'Load failed');
                });
                return;
            }
            if (currentReport === 'daily-profit') {
                refreshDailyProfit().catch((error) => {
                    updateModeBadge(currentMode, error.message || 'Load failed');
                });
                return;
            }
            renderAll();
        });
        $('report-search').addEventListener('keydown', (event) => {
            if (event.key === 'Enter') renderAll();
        });
        $('status-filter').addEventListener('change', renderAll);
        $('payment-status-filter').addEventListener('change', renderAll);
        $('period-filter').addEventListener('change', () => {
            if (currentReport === 'finance-summary') $('generate-report').click();
        });
        $('from-date-filter').addEventListener('change', () => {
            if (currentReport === 'finance-summary' || currentReport === 'daily-profit') $('generate-report').click();
        });
        $('to-date-filter').addEventListener('change', () => {
            if (currentReport === 'finance-summary' || currentReport === 'daily-profit') $('generate-report').click();
        });

        $('copy-whatsapp').addEventListener('click', () => {
            if (currentReport === 'daily-profit') {
                copyText(dailyProfitShareText(reportData.dailyProfit || { rows: [], totals: {} })).catch((error) => updateModeBadge(currentMode, error.message || 'Copy failed'));
                return;
            }
            if (currentReport === 'location-summary') {
                copyText(locationShareText(reportData.currentLocationSummary?.locations || [])).catch((error) => updateModeBadge(currentMode, error.message || 'Copy failed'));
                return;
            }
            copyText(exportRows.map((row) => row.join(' | ')).join('\n')).catch((error) => updateModeBadge(currentMode, error.message || 'Copy failed'));
        });

        $('export-excel').addEventListener('click', () => {
            const rows = [exportHeaders, ...exportRows];
            const html = `
                <html><head><meta charset="UTF-8"></head><body>
                <table>${rows.map((row) => `<tr>${row.map((cell) => `<td>${clean(cell)}</td>`).join('')}</tr>`).join('')}</table>
                </body></html>
            `;
            const blob = new Blob([html], { type: 'application/vnd.ms-excel' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `fleet-${currentReport}-${new Date().toISOString().slice(0, 10)}.xls`;
            document.body.appendChild(link);
            link.click();
            link.remove();
            URL.revokeObjectURL(url);
        });

        applyTheme();
        loadReports();
    </script>
</body>
</html>
