<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleet Dashboard — Trip Cards</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
            padding: 20px 40px;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header p { color: #94a3b8; margin-top: 5px; }
        .mode-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 6px 12px;
            cursor: pointer;
        }
        .mode-toggle label { cursor: pointer; font-size: 14px; color: #94a3b8; }
        .mode-toggle select {
            background: #0f172a;
            color: #e2e8f0;
            border: 1px solid #334155;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 14px;
            cursor: pointer;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 30px 40px; }
        
        /* Filter Bar */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            align-items: end;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
            min-width: 180px;
        }
        .filter-group label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
            font-weight: 600;
        }
        .filter-group input {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 10px 12px;
            color: #e2e8f0;
            font-size: 14px;
            outline: none;
        }
        .filter-group input:focus {
            border-color: #60a5fa;
        }
        .filter-btn {
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            border: none;
            border-radius: 8px;
            padding: 10px 24px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: opacity 0.2s;
        }
        .filter-btn:hover { opacity: 0.9; }
        .filter-btn.reset {
            background: #334155;
            color: #e2e8f0;
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 24px;
            transition: transform 0.2s, border-color 0.2s;
            cursor: pointer;
        }
        .stat-card:hover { transform: translateY(-4px); border-color: #60a5fa; }
        .stat-card .icon { font-size: 32px; margin-bottom: 12px; }
        .stat-card .value {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-card .label { color: #94a3b8; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }

        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            margin-top: 24px;
        }
        .trip-card {
            background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 20px;
            transition: transform 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .trip-card:hover { transform: translateY(-4px); border-color: #60a5fa; }
        .trip-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            border-bottom: 1px solid #334155;
        }
        .trip-card-plate {
            font-size: 18px;
            font-weight: 700;
            color: #60a5fa;
        }
        .trip-card-status {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-planned { background: #451a03; color: #fbbf24; }
        .status-in_progress { background: #1e3a5f; color: #60a5fa; }
        .status-completed { background: #064e3b; color: #34d399; }
        .status-cancelled { background: #450a0a; color: #fca5a5; }
        
        .trip-card-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .info-label { color: #94a3b8; font-size: 13px; }
        .info-value { font-weight: 600; font-size: 14px; }
        
        /* Timeline Strip */
        .timeline-strip {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background: rgba(60, 150, 250, 0.08);
            border: 1px solid rgba(60, 150, 250, 0.2);
            border-radius: 10px;
            margin-top: 4px;
        }
        .timeline-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            min-width: 80px;
        }
        .timeline-node .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #60a5fa;
            border: 2px solid #1e3a5f;
        }
        .timeline-node .dot.start { background: #34d399; }
        .timeline-node .dot.dest { background: #fbbf24; }
        .timeline-node .dot.return { background: #34d399; }
        .timeline-node .label {
            font-size: 10px;
            color: #94a3b8;
            white-space: nowrap;
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .timeline-connector {
            flex: 1;
            height: 2px;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            border-radius: 1px;
            min-width: 20px;
        }
        
        /* Financial Summary */
        .financial-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding-top: 8px;
            border-top: 1px solid #334155;
        }
        .financial-item {
            text-align: center;
        }
        .financial-item .amount {
            font-size: 15px;
            font-weight: 700;
        }
        .financial-item .amount.revenue { color: #34d399; }
        .financial-item .amount.expense { color: #f87171; }
        .financial-item .amount.profit { color: #60a5fa; }
        .financial-item .ftype { font-size: 11px; color: #94a3b8; }
        
        /* Toggle Button */
        .toggle-timeline {
            background: transparent;
            border: 1px solid #334155;
            color: #94a3b8;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            text-align: center;
            margin-top: 4px;
        }
        .toggle-timeline:hover { border-color: #60a5fa; color: #60a5fa; }

        /* Timeline Expansion */
        .timeline-panel {
            display: none;
            border-top: 1px dashed #334155;
            padding-top: 14px;
            margin-top: 6px;
        }
        .timeline-card-inner {
            padding: 16px;
            background: #0b1120;
            border-radius: 10px;
        }
        .timeline-card-inner h3 {
            font-size: 14px;
            margin-bottom: 12px;
            color: #e2e8f0;
        }
        .journey-stitch {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            padding: 12px 16px;
            background: rgba(60, 150, 250, 0.1);
            border: 1px solid rgba(60, 150, 250, 0.3);
            border-radius: 8px;
            overflow-x: auto;
        }
        .journey-stitch span {
            font-weight: 600;
            color: #60a5fa;
            font-size: 13px;
            white-space: nowrap;
        }
        .journey-stitch .connector {
            font-size: 18px;
            color: #94a3b8;
        }
        .timeline-entries {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .timeline-entry {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            background: #1e293b;
            transition: background 0.2s;
        }
        .timeline-entry:hover { background: #2a3548; }
        .timeline-entry .time-stamp {
            font-family: 'SF Mono', monospace;
            font-size: 12px;
            color: #94a3b8;
            min-width: 160px;
        }
        .source-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 80px;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .source-gps { background: #451a03; color: #fbbf24; }
        .source-odoo { background: #1e3a5f; color: #60a5fa; }
        .source-supervisor { background: #064e3b; color: #34d399; }
        .location-text { font-weight: 600; flex: 1; font-size: 13px; }
        .note-text { font-size: 11px; color: #6b7280; flex: 1; text-align: right; }
        .discrepancy-icon { color: #f87171; font-weight: 700; font-size: 13px; }
        
        .loading { text-align: center; padding: 40px; color: #94a3b8; }
        .error { background: #450a0a; color: #fca5a5; padding: 16px; border-radius: 8px; margin: 20px 0; }
        
        @media (max-width: 768px) {
            .container { padding: 20px; }
            .header { flex-direction: column; gap: 16px; }
            .cards-grid { grid-template-columns: 1fr; }
            .filter-bar { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>🚛 Fleet Dashboard</h1>
            <p>Real-time fleet operations with timeline tracking</p>
        </div>
        <div class="mode-toggle">
            <label for="mode">Mode:</label>
            <select id="mode" onchange="changeMode()">
                <option value="demo" selected>🎮 Demo (Fast)</option>
                <option value="live">🌐 Live (Real Data)</option>
            </select>
        </div>
    </div>
    <div class="container">
        <div id="loading" class="loading">Loading fleet data...</div>
        <div id="content" style="display:none;">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="icon">🚛</div>
                    <div id="total-vehicles" class="value">-</div>
                    <div class="label">Total Vehicles</div>
                </div>
                <div class="stat-card">
                    <div class="icon">🗺️</div>
                    <div id="total-trips" class="value">-</div>
                    <div class="label">Total Trips</div>
                </div>
                <div class="stat-card">
                    <div class="icon">👤</div>
                    <div id="total-drivers" class="value">-</div>
                    <div class="label">Active Drivers</div>
                </div>
                <div class="stat-card">
                    <div class="icon">🚦</div>
                    <div id="active-trips" class="value">-</div>
                    <div class="label">Active Trips</div>
                </div>
                <div class="stat-card">
                    <div class="icon">💰</div>
                    <div id="total-revenue" class="value">-</div>
                    <div class="label">Total Revenue</div>
                </div>
                <div class="stat-card">
                    <div class="icon">📊</div>
                    <div id="total-expense" class="value">-</div>
                    <div class="label">Total Expense</div>
                </div>
            </div>

            <!-- Filter Bar -->
            <div class="filter-bar">
                <div class="filter-group">
                    <label for="filter-plate">Vehicle Plate</label>
                    <input type="text" id="filter-plate" placeholder="e.g. TOP-1234-AB" oninput="applyFilters()">
                </div>
                <div class="filter-group">
                    <label for="filter-driver">Driver Name</label>
                    <input type="text" id="filter-driver" placeholder="e.g. Abebe Bekele" oninput="applyFilters()">
                </div>
                <div class="filter-group">
                    <label for="filter-from">From Date</label>
                    <input type="date" id="filter-from" onchange="applyFilters()">
                </div>
                <div class="filter-group">
                    <label for="filter-to">To Date</label>
                    <input type="date" id="filter-to" onchange="applyFilters()">
                </div>
                <div class="filter-group" style="flex:0;">
                    <button class="filter-btn reset" onclick="resetFilters()">Reset</button>
                </div>
            </div>

            <!-- Trip Cards Grid -->
            <h2 style="margin-bottom: 12px;">Recent Trips</h2>
            <div id="cards-container" class="cards-grid"></div>
            <div id="no-results" style="display:none; text-align:center; padding:40px; color:#94a3b8;">No trips match your filters.</div>
        </div>
        <div id="error" class="error" style="display:none;"></div>
    </div>
    <script>
        let currentMode = 'demo';
        let allJourneys = [];
        let expandedTripId = null;

        function changeMode() {
            currentMode = document.getElementById('mode').value;
            expandedTripId = null;
            document.getElementById('loading').style.display = 'block';
            document.getElementById('content').style.display = 'none';
            loadData();
        }

        async function loadData() {
            try {
                const res = await fetch(`/api/dashboard/full?mode=${currentMode}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
                const data = await res.json();

                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';

                // Summary cards
                const s = data.summary || {};
                document.getElementById('total-vehicles').textContent = s.total_vehicles || 0;
                document.getElementById('total-trips').textContent = s.total_journeys || 0;
                document.getElementById('total-drivers').textContent = s.total_drivers || 0;
                document.getElementById('active-trips').textContent = data.active_journey_count || 0;
                document.getElementById('total-revenue').textContent = formatMoney(data.total_revenue || 0);
                document.getElementById('total-expense').textContent = formatMoney(data.total_expense || 0);

                // Fetch all journeys via the new API
                await fetchJourneys();
            } catch (err) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = 'Error loading data: ' + err.message;
                console.error(err);
            }
        }

        async function fetchJourneys() {
            try {
                const res = await fetch('/api/journeys');
                if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
                const data = await res.json();
                allJourneys = data.journeys || [];
                applyFilters();
            } catch (err) {
                console.error('Error fetching journeys:', err);
            }
        }

        function applyFilters() {
            const plate = document.getElementById('filter-plate').value.toLowerCase();
            const driver = document.getElementById('filter-driver').value.toLowerCase();
            const fromDateStr = document.getElementById('filter-from').value;
            const toDateStr = document.getElementById('filter-to').value;
            const fromDate = fromDateStr ? new Date(fromDateStr) : null;
            const toDate = toDateStr ? new Date(toDateStr) : null;

            const filtered = allJourneys.filter(j => {
                const jDate = new Date(j.departure_date);
                if (plate && !j.vehicle_plate.toLowerCase().includes(plate)) return false;
                if (driver && !j.driver_name.toLowerCase().includes(driver)) return false;
                if (fromDate && jDate < fromDate) return false;
                if (toDate) {
                    const nextDay = new Date(toDate);
                    nextDay.setDate(nextDay.getDate() + 1);
                    if (jDate >= nextDay) return false;
                }
                return true;
            });

            renderCards(filtered);
        }

        function resetFilters() {
            document.getElementById('filter-plate').value = '';
            document.getElementById('filter-driver').value = '';
            document.getElementById('filter-from').value = '';
            document.getElementById('filter-to').value = '';
            applyFilters();
        }

        function renderCards(journeys) {
            const container = document.getElementById('cards-container');
            const noResults = document.getElementById('no-results');

            if (journeys.length === 0) {
                container.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }
            noResults.style.display = 'none';

            container.innerHTML = journeys.map(j => {
                const statusClass = j.status ? `status-${j.status}` : 'status-planned';
                const destinationsText = j.destinations ? j.destinations.join(', ') : 'N/A';
                const destShort = j.destinations && j.destinations.length > 0 ? j.destinations[0] : 'N/A';
                const profit = (j.total_revenue || 0) - (j.total_expense || 0);
                const profitClass = profit >= 0 ? 'revenue' : 'expense';

                return `
                <div class="trip-card" data-journey-id="${j.id}">
                    <div class="trip-card-header">
                        <div class="trip-card-plate">${j.vehicle_plate || 'N/A'}</div>
                        <div class="trip-card-status ${statusClass}">${j.status || 'N/A'}</div>
                    </div>
                    <div class="trip-card-info">
                        <div class="info-row">
                            <span class="info-label">👤 Driver</span>
                            <span class="info-value">${j.driver_name || 'N/A'}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">📍 Origin</span>
                            <span class="info-value">${j.origin || 'Topwater Ethiopia'}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">🎯 Destination</span>
                            <span class="info-value">${destinationsText}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">📅 Departure</span>
                            <span class="info-value">${j.departure_date || 'N/A'}</span>
                        </div>
                    </div>

                    <!-- Visual Timeline Strip -->
                    <div class="timeline-strip">
                        <div class="timeline-node">
                            <div class="dot start"></div>
                            <div class="label">Topwater</div>
                        </div>
                        <div class="timeline-connector"></div>
                        <div class="timeline-node">
                            <div class="dot dest"></div>
                            <div class="label">${destShort}</div>
                        </div>
                        <div class="timeline-connector"></div>
                        <div class="timeline-node">
                            <div class="dot return"></div>
                            <div class="label">Topwater</div>
                        </div>
                    </div>

                    <!-- Financial Summary -->
                    <div class="financial-row">
                        <div class="financial-item">
                            <div class="amount revenue">${formatMoney(j.total_revenue || 0)}</div>
                            <div class="ftype">Revenue</div>
                        </div>
                        <div class="financial-item">
                            <div class="amount expense">${formatMoney(j.total_expense || 0)}</div>
                            <div class="ftype">Expense</div>
                        </div>
                        <div class="financial-item">
                            <div class="amount ${profitClass}">${formatMoney(profit)}</div>
                            <div class="ftype">${profit >= 0 ? 'Profit' : 'Loss'}</div>
                        </div>
                    </div>

                    <button class="toggle-timeline" onclick="toggleTimeline(${j.id})">
                        View Timeline
                    </button>
                    <div id="timeline-panel-${j.id}" class="timeline-panel">
                        <div class="timeline-card-inner" id="timeline-content-${j.id}">
                            <div style="text-align:center; padding: 20px; color: #94a3b8;">Loading timeline...</div>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        async function toggleTimeline(tripId) {
            const panel = document.getElementById(`timeline-panel-${tripId}`);
            const content = document.getElementById(`timeline-content-${tripId}`);
            if (!panel || !content) return;

            if (panel.style.display === 'block') {
                panel.style.display = 'none';
                return;
            }

            // Close others
            document.querySelectorAll('.timeline-panel').forEach(p => p.style.display = 'none');
            panel.style.display = 'block';

            content.innerHTML = '<div style="text-align:center; padding: 20px; color: #94a3b8;">Loading timeline...</div>';
            try {
                const res = await fetch(`/api/trips/${tripId}/timeline`);
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Timeline not found');
                renderTimelineContent(content, data.timeline || []);
            } catch (err) {
                content.innerHTML = `<div style="text-align:center; padding: 20px; color: #fca5a5;">Error loading timeline: ${err.message}</div>`;
            }
        }

        function renderTimelineContent(container, entries) {
            if (entries.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding: 20px; color: #94a3b8;">No timeline entries.</div>';
                return;
            }

            const uniqueLocations = [...new Set(entries.map(e => e.location))];
            const discrepancyCount = entries.filter(e => e.discrepancy_flag).length;

            let html = '<div class="timeline-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;"><h3>🛣️ Journey Timeline</h3>';
            if (discrepancyCount > 0) {
                html += `<span style="color:#f87171; font-size:12px;">⚠️ ${discrepancyCount} GPS vs Odoo discrepancy${discrepancyCount>1?'s':''}</span>`;
            }
            html += '</div>';

            html += '<div class="journey-stitch">';
            uniqueLocations.forEach((loc, i) => {
                html += `<span>${loc}</span>`;
                if (i < uniqueLocations.length - 1) html += '<span class="connector">→</span>';
            });
            html += '</div>';

            html += '<div class="timeline-entries">';
            for (const entry of entries) {
                const date = new Date(entry.timestamp);
                const timeStr = date.toLocaleString('en-US', { timeZone: 'UTC', hour: '2-digit', minute: '2-digit', day: 'numeric', month: 'short', year: 'numeric' });
                
                let sourceClass = 'source-odoo';
                if (entry.source === 'GPS') sourceClass = 'source-gps';
                else if (entry.source === 'Supervisor') sourceClass = 'source-supervisor';

                html += `<div class="timeline-entry">
                    <span class="time-stamp">${timeStr}</span>
                    <span class="source-badge ${sourceClass}">${entry.source}</span>
                    <span class="location-text">${entry.location}</span>`;
                if (entry.discrepancy_flag) {
                    html += `<span class="discrepancy-icon">⚠️</span>`;
                }
                html += `<span class="note-text">${entry.note || ''}</span>
                </div>`;
            }
            html += '</div>';

            container.innerHTML = html;
        }

        function formatMoney(amount) {
            const sign = amount < 0 ? '-' : '';
            return sign + 'ETB ' + Math.abs(Number(amount)).toLocaleString('en-US', { maximumFractionDigits: 0 });
        }
