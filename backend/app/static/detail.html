<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content(Ref: designing a mobile trip detail page that adapts to both mobile and desktop. The core layout will feature a dark navy background, global header with user/refresh icons, a top info card displaying trip details, and a row of 3 action buttons for interaction. The main content will consist of a card-based trip timeline, a financial summary, and a telemetry placeholder. The design will also include a bottom navigation bar. In terms of functionality, the page will be able to load a specific journey based on the `journey_id` URL parameter, fetch its data from an existing API, and render the elements dynamically. This includes generating route data, calculating distances and completion percentages, and creating a progress bar for each route segment. The financial data will also be pulled from the API and formatted for display.)">
    <title>Trip Detail</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0B111B; color: #e2e8f0; min-height: 100vh; padding-bottom: 80px;
        }
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; }
        .header-icon { width: 40px; height: 40px; border-radius: 10px; background: #161b2e; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; }
        .header-title { font-size: 18px; font-weight: 700; }
        /* Trip Title */
        .trip-title-row { display: flex; align-items: center; gap: 12px; padding: 0 20px 20px; }
        .back-btn { width: 36px; height: 36px; border-radius: 50%; background: #161b2e; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; border: none; color: #e2e8f0; }
        .trip-plate { font-size: 22px; font-weight: 700; }
        .status-pill { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .status-in_progress { background: rgba(96, 165, 250, 0.15); color: #60a5fa; }
        .status-completed { background: rgba(52, 211, 153, 0.15); color: #34d399; }
        .status-planned { background: rgba(251, 191, 36, 0.15); color: #fbbf24; }
        .status-cancelled { background: rgba(248, 113, 113, 0.15); color: #f87171; }
        /* Card */
        .card { background: #161b2e; border: 1px solid #1e293b; border-radius: 16px; margin: 0 20px 16px; padding: 20px; }
        .card-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .card-divider { height: 1px; background: #1e293b; margin: 12px 0; }
        /* Info Grid */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .info-item { display: flex; flex-direction: column; gap: 4px; }
        .info-item .label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 6px; }
        .info-item .value { font-size: 14px; font-weight: 600; }
        /* Actions */
        .actions { display: flex; gap: 12px; padding: 0 20px 20px; }
        .btn-primary { flex: 1; background: #2563eb; border: none; border-radius: 12px; padding: 14px; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-icon { width: 48px; height: 48px; border-radius: 12px; background: #161b2e; border: 1px solid #1e293b; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; color: #e2e8f0; }
        /* Trip Legs Timeline */
        .timeline { position: relative; padding-left: 20px; }
        .timeline::before { content: ''; position: absolute; left: 7px; top: 8px; bottom: 8px; width: 2px; background: #1e293b; }
        .timeline-stop { position: relative; padding-bottom: 20px; }
        .timeline-stop:last-child { padding-bottom: 0; }
        .stop-content { display: flex; align-items: flex-start; gap: 12px; }
        .stop-dot { width: 16px; height: 16px; border-radius: 50%; position: absolute; left: -20px; top: 2px; z-index: 2; }
        .stop-dot.green { background: #34d399; }
        .stop-dot.blue { background: #60a5fa; }
        .stop-dot.outline { background: transparent; border: 2px solid #334155; }
        .stop-info { flex: 1; }
        .stop-name { font-size: 14px; font-weight: 600; }
        .stop-sub { font-size: 12px; color: #64748b; }
        .stop-meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
        .stop-badge { background: #0B111B; border: 1px solid #1e293b; border-radius: 6px; padding: 2px 8px; font-size: 11px; color: #94a3b8; }
        .stop-badge.green { color: #34d399; border-color: rgba(52,211,153,0.3); }
        .stop-dist { font-size: 12px; color: #64748b; }
        .progress-section { margin-top: 8px; }
        .progress-text { font-size: 11px; color: #94a3b8; display: flex; justify-content: space-between; }
        .progress-bar { height: 4px; background: #1e293b; border-radius: 2px; margin-top: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: #60a5fa; border-radius: 2px; transition: width 1s ease; }
        /* Financials */
        .finance-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; }
        .finance-row:not(:last-child) { border-bottom: 1px solid #1e293b; }
        .finance-label { font-size: 14px; color: #94a3b8; }
        .finance-value { font-size: 16px; font-weight: 700; }
        .finance-value.revenue { color: #34d399; }
        .finance-value.expense { color: #f87171; }
        .finance-bar { height: 4px; background: #1e293b; border-radius: 2px; margin-top: 8px; overflow: hidden; }
        .finance-fill { height: 100%; border-radius: 2px; }
        .finance-fill.revenue { background: #34d399; }
        .finance-fill.expense { background: #f87171; }
        .profit-row { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; padding-top: 12px; border-top: 1px solid #1e293b; }
        .profit-label { font-size: 14px; color: #94a3b8; }
        .profit-value { display: flex; align-items: center; gap: 6px; font-size: 20px; font-weight: 700; }
        .trend-icon { color: #34d399; }
        /* Telemetry */
        .telemetry-chart { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%); border-radius: 12px; height: 180px; display: flex; align-items: center; justify-content: center; position: relative; }
        .telemetry-chart .placeholder { text-align: center; color: #64748b; font-size: 14px; }
        .telemetry-chart .icon { font-size: 48px; margin-bottom: 8px; opacity: 0.3; }
        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; height: 64px; background: #0B111B; border-top: 1px solid #1e293b;
            display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 11px; color: #64748b; cursor: pointer; }
        .nav-item.active { color: #34d399; }
        .nav-item .nav-icon { font-size: 20px; }
        .nav-item.active .nav-icon { background: rgba(52, 211, 153, 0.15); border-radius: 12px; padding: 4px 12px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-icon">👤</div>
        <div class="header-title">Fleet Dashboard</div>
        <div class="header-icon">🔄</div>
    </div>

    <div class="trip-title-row">
        <a href="/" class="back-btn">←</a>
        <div class="trip-plate" id="trip-plate">Loading...</div>
        <div class="status-pill" id="trip-status">...</div>
    </div>

    <div class="card" id="trip-info-card">
        <div class="info-grid">
            <div class="info-item">
                <div class="label">👤 DRIVER</div>
                <div class="value" id="driver-name">...</div>
            </div>
            <div class="info-item">
                <div class="label">📅 DEPARTURE</div>
                <div class="value" id="departure-date">...</div>
            </div>
            <div class="info-item" style="grid-column: span 2;">
                <div class="label">📍 ROUTE</div>
                <div class="value" id="route-text">...</div>
            </div>
        </div>
    </div>

    <div class="actions">
        <button class="btn-primary">📡 Track Live</button>
        <button class="btn-icon">✏️</button>
        <button class="btn-icon">📞</button>
    </div>

    <div class="card">
        <div class="card-title">🗺️ Trip Legs <span style="margin-left:auto;font-size:12px;color:#64748b;background:#0B111B;border:1px solid #1e293b;border-radius:20px;padding:2px 10px;" id="stops-count">0 Stops</span></div>
        <div class="timeline" id="trip-timeline"></div>
    </div>

    <div class="card">
        <div class="card-title">💰 Financials</div>
        <div class="card-divider"></div>
        <div class="finance-row">
            <div class="finance-label">Revenue</div>
            <div class="finance-value revenue" id="fin-revenue">—</div>
        </div>
        <div class="finance-bar"><div class="finance-fill revenue" id="rev-bar" style="width:100%"></div></div>
        <div class="finance-row">
            <div class="finance-label">Expense</div>
            <div class="finance-value expense" id="fin-expense">—</div>
        </div>
        <div class="finance-bar"><div class="finance-fill expense" id="exp-bar" style="width:30%"></div></div>
        <div class="profit-row">
            <div class="profit-label">Net Profit Margin</div>
            <div class="profit-value"><span class="trend-icon">📈</span> <span id="profit-margin">—</span></div>
        </div>
    </div>

    <div class="card">
        <div class="card-title">📊 Telemetry</div>
        <div class="card-divider"></div>
        <div class="telemetry-chart">
            <div class="placeholder"><div class="icon">🛣️</div><div>Live Telemetry</div></div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="window.location.href='/'"><div class="nav-icon">⊞</div><div>Dashboard</div></div>
        <div class="nav-item active" id="nav-trips"><div class="nav-icon">🚛</div><div>Trips</div></div>
        <div class="nav-item"><div class="nav-icon">💳</div><div>Financials</div></div>
        <div class="nav-item"><div class="nav-icon">👤</div><div>Profile</div></div>
    </div>

    <script>
        const API_BASE = '/api';
        const urlParams = new URLSearchParams(window.location.search);
        const journeyId = urlParams.get('journey_id');

        async function loadJourney() {
            if (!journeyId) return showError("No journey ID");
            try {
                const res = await fetch(`${API_BASE}/journeys/${journeyId}`);
                if (!res.ok) throw new Error('Not found');
                const j = await res.json();
                renderJourney(j);
            } catch (e) {
                showError("Failed to load: " + e.message);
            }
        }

        function renderJourney(j) {
            document.getElementById('trip-plate').textContent = j.vehicle_plate || 'N/A';
            const statusEl = document.getElementById('trip-status');
            statusEl.textContent = (j.status || 'N/A').replace('_', ' ');
            statusEl.className = 'status-pill status-' + (j.status || 'planned');
            document.getElementById('driver-name').textContent = j.driver_name || 'N/A';
            document.getElementById('departure-date').textContent = j.departure_date || 'N/A';
            document.getElementById('route-text').textContent = `${j.origin || 'Topwater'} → ${j.destinations ? j.destinations[0] : 'N/A'}`;

            const tripLegs = j.trips || [];
            document.getElementById('stops-count').textContent = `${tripLegs.length} Stops`;

            const timeline = document.getElementById('trip-timeline');
            timeline.innerHTML = tripLegs.map((trip, idx) => {
                const isFirst = idx === 0;
                const isLast = idx === tripLegs.length - 1;
                let dotClass = isFirst ? 'green' : (isLast ? 'outline' : 'blue');
                let badge = isFirst ? `<span class="stop-badge green">${trip.departure_date}</span>` : (isLast ? '<span class="stop-badge">Pending</span>' : '<span class="stop-badge">ETA</span>');
                let progressHtml = '';
                if (!isFirst && !isLast) {
                    const pct = Math.round((120 / trip.distance_km) * 100); // Mock progress
                    progressHtml = `<div class="progress-section"><div class="progress-text"><span>120km done</span><span>${trip.distance_km - 120}km left</span></div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div></div>`;
                }
                return `
                    <div class="timeline-stop">
                        <div class="stop-content">
                            <div class="stop-dot ${dotClass}"></div>
                            <div class="stop-info">
                                <div class="stop-name">${trip.destination}</div>
                                <div class="stop-sub">${trip.destination === 'Topwater Ethiopia HQ, Addis Ababa' ? 'Addis Ababa' : trip.destination}</div>
                                <div class="stop-meta">
                                    ${badge}
                                    <span class="stop-dist">🛣️ ${trip.distance_km} km</span>
                                </div>
                                ${progressHtml}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            const rev = j.total_revenue || 0;
            const exp = j.total_expense || 0;
            document.getElementById('fin-revenue').textContent = 'ETB ' + rev.toLocaleString();
            document.getElementById('fin-expense').textContent = 'ETB ' + exp.toLocaleString();
            document.getElementById('exp-bar').style.width = Math.min((exp / Math.max(rev, 1)) * 100, 100) + '%';
            const margin = rev > 0 ? Math.round(((rev - exp) / rev) * 100) : 0;
            document.getElementById('profit-margin').textContent = margin + '%';
        }

        function showError(msg) {
            document.body.innerHTML = '<div style="text-align:center;padding:40px;color:#f87171;">' + msg + '</div>';
        }

        loadJourney();
    </script>
</body>
</html>
