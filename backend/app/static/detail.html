<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleet Trips - Trip Detail</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #f8fafc;
            --panel: #ffffff;
            --panel-2: #f4f8fd;
            --line: #d9e2ef;
            --text: #0f172a;
            --muted: #64748b;
            --primary: #00499e;
            --secondary: #0e9849;
            --primary-soft: #eaf4ff;
            --secondary-soft: #e9f9f0;
            --amber: #f59e0b;
            --red: #dc2626;
        }
        body.dark {
            --bg: #0f172a;
            --panel: #111827;
            --panel-2: #162033;
            --line: #253244;
            --text: #e5e7eb;
            --muted: #94a3b8;
            --primary-soft: #0f2747;
            --secondary-soft: #0d2e1c;
        }
        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        button, select { font: inherit; }
        .topbar { display: flex; align-items: center; justify-content: space-between; gap: 14px; padding: 18px 24px; border-bottom: 1px solid var(--line); background: var(--panel); }
        .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
        .brand img { width: 40px; height: 40px; border-radius: 8px; background: #fff; }
        .title { font-size: 20px; font-weight: 900; }
        .subtitle { color: var(--muted); font-size: 13px; margin-top: 2px; }
        .actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn { min-height: 40px; border: 1px solid var(--line); border-radius: 8px; background: var(--panel); color: var(--text); padding: 8px 12px; text-decoration: none; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn.primary { background: var(--primary); border-color: var(--primary); color: #fff; }
        .icon { width: 18px; height: 18px; stroke-width: 2; flex: 0 0 auto; }
        .page { max-width: 1380px; margin: 0 auto; padding: 24px; }
        /* .grid removed - merged into single panel */
        .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; margin-bottom: 16px; }
        .panel-header { padding: 14px 16px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .panel-title { font-weight: 900; }
        .panel-body { padding: 16px; }
        .metrics { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
        .metric { background: var(--panel-2); border: 1px solid var(--line); border-radius: 8px; padding: 12px; min-width: 0; }
        .metric-label { color: var(--muted); font-size: 11px; text-transform: uppercase; }
        .metric-value { font-size: 18px; font-weight: 900; margin-top: 6px; overflow-wrap: anywhere; }
        .green { color: var(--secondary); }
        .red { color: var(--red); }
        .amber { color: var(--amber); }
        .pill { display: inline-flex; min-height: 24px; align-items: center; padding: 3px 9px; border-radius: 999px; border: 1px solid rgba(0,73,158,.3); background: var(--primary-soft); color: var(--primary); font-size: 12px; white-space: nowrap; }
        .route { display: grid; gap: 10px; }
        .route-line { display: flex; align-items: center; gap: 8px; font-weight: 900; overflow-wrap: anywhere; }
        .timeline { display: grid; gap: 10px; position: relative; }
        .timeline-entry { display: grid; grid-template-columns: 28px minmax(0, 1fr); gap: 10px; }
        .dot { width: 14px; height: 14px; border-radius: 50%; background: var(--primary); margin-top: 4px; box-shadow: 0 0 0 4px var(--primary-soft); }
        .timeline-card { border: 1px solid var(--line); background: var(--panel-2); border-radius: 8px; padding: 12px; }
        .timeline-card strong { display: block; margin-bottom: 4px; }
        .timeline-card span { color: var(--muted); font-size: 12px; }
        .compare { display: grid; gap: 10px; }
        .compare-row { display: grid; grid-template-columns: 130px minmax(0, 1fr); gap: 12px; padding: 10px 12px; border: 1px solid var(--line); border-radius: 8px; background: var(--panel-2); }
        .compare-label { color: var(--muted); font-size: 12px; text-transform: uppercase; }
        .empty { padding: 32px 16px; text-align: center; color: var(--muted); }
        @media (max-width: 980px) { .grid { grid-template-columns: 1fr; } .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
        @media (max-width: 560px) {
            .topbar { align-items: flex-start; flex-direction: column; padding: 14px; }
            .actions { width: 100%; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .btn { min-height: 38px; padding: 7px 9px; font-size: 13px; }
            .page { padding: 12px; }
            .panel { margin-bottom: 12px; }
            .panel-header { align-items: flex-start; flex-direction: column; padding: 12px; }
            .panel-body { padding: 12px; }
            .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
            .metric { padding: 9px; }
            .metric-value { font-size: 15px; }
            .route-line { align-items: flex-start; flex-wrap: wrap; font-size: 13px; }
            .compare-row { grid-template-columns: minmax(82px, auto) minmax(0, 1fr); gap: 8px; padding: 9px; }
            .timeline { gap: 8px; }
            .timeline-entry { grid-template-columns: 18px minmax(0, 1fr); gap: 8px; }
            .dot { width: 10px; height: 10px; box-shadow: 0 0 0 3px var(--primary-soft); }
            .timeline-card { padding: 9px; }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="brand">
            <img src="/static/fleet-trips-logo.svg" alt="Fleet Trips">
            <div>
                <div class="title" id="page-title">Trip Detail</div>
                <div class="subtitle" id="page-subtitle">DB location and Mayet GPS comparison</div>
            </div>
        </div>
        <div class="actions">
            <a class="btn" href="/"><i data-lucide="layout-dashboard" class="icon"></i>Dashboard</a>
            <a class="btn" id="map-link" href="/map.html"><i data-lucide="map" class="icon"></i>Visual Map</a>
            <a class="btn primary" href="https://mayetgps.com/" target="_blank" rel="noreferrer"><i data-lucide="satellite" class="icon"></i>Mayet</a>
            <button class="btn" id="theme-toggle" type="button"><i data-lucide="moon" class="icon"></i><span id="theme-label">Dark</span></button>
        </div>
    </header>

    <main class="page">
        <section class="panel">
            <div class="panel-header">
                <div>
                    <div class="panel-title" id="trip-heading">Loading...</div>
                    <div class="subtitle" id="trip-route">...</div>
                </div>
                <span class="pill" id="trip-state">...</span>
            </div>
            <div class="panel-body">
                <div class="metrics" id="metrics"></div>
            </div>
        </section>

        <div class="panel">
            <div class="panel-header"><div class="panel-title">Timeline & Location</div></div>
            <div class="panel-body">
                <div class="timeline" id="timeline"></div>
                <div style="margin-top:16px;border-top:1px solid var(--line);padding-top:16px;">
                    <div class="panel-title" style="font-size:13px;margin-bottom:8px;">Location Comparison</div>
                    <div class="compare" id="location-compare"></div>
                </div>
                <div style="margin-top:16px;border-top:1px solid var(--line);padding-top:16px;">
                    <div class="panel-title" style="font-size:13px;margin-bottom:8px;">Route</div>
                    <div class="route" id="route-summary"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script>
        const API_BASE = '/api';
        const params = new URLSearchParams(window.location.search);
        const tripId = params.get('journey_id') || params.get('trip_id');
        let currentTheme = localStorage.getItem('fleetTheme') || 'light';

        const $ = (id) => document.getElementById(id);
        const clean = (value) => String(value ?? '').replace(/[&<>"']/g, (char) => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[char]));
        const money = (value) => new Intl.NumberFormat('en-ET', { style: 'currency', currency: 'ETB', maximumFractionDigits: 0 }).format(Number(value || 0));

        function refreshIcons() { if (window.lucide) window.lucide.createIcons(); }
        function applyTheme() {
            document.body.classList.toggle('dark', currentTheme === 'dark');
            $('theme-toggle').innerHTML = `<i data-lucide="${currentTheme === 'dark' ? 'sun' : 'moon'}" class="icon"></i><span id="theme-label">${currentTheme === 'dark' ? 'Light' : 'Dark'}</span>`;
            refreshIcons();
        }
        function normalizeState(status) {
            const raw = String(status || 'draft').toLowerCase();
            return ({ planned: 'available', in_progress: 'dispatched', completed: 'done', cancel: 'cancelled', canceled: 'cancelled' })[raw] || raw;
        }

        async function fetchJson(url) {
            const response = await fetch(url);
            if (!response.ok) throw new Error(await response.text());
            return response.json();
        }

        async function loadTrip() {
            if (!tripId) return showEmpty('No trip id provided.');
            const mode = localStorage.getItem('fleetDashboardMode') || 'live';
            let trip = null;
            try {
                const data = await fetchJson(`${API_BASE}/dashboard/full?mode=${encodeURIComponent(mode)}`);
                trip = (data.recent_journeys || []).find((item) => String(item.id) === String(tripId));
            } catch (error) {}
            if (!trip) {
                try { trip = await fetchJson(`${API_BASE}/journeys/${encodeURIComponent(tripId)}`); } catch (error) {}
            }
            if (!trip) return showEmpty('Trip not found in the selected data source.');
            // Prefer GPS data already attached by dashboard, otherwise fetch fresh
            let gpsPayload = null;
            if (trip.mayet_status || trip.mayet_captured_at) {
                gpsPayload = { gps: { location: trip.mayet_status, captured_at: trip.mayet_captured_at, latitude: trip.mayet_latitude, longitude: trip.mayet_longitude } };
            } else {
                gpsPayload = await loadGps(trip.vehicle_plate || trip.vehicle_id || trip.id);
            }
            renderTrip(trip, gpsPayload);
        }

        async function loadGps(vehicleRef) {
            try { return await fetchJson(`${API_BASE}/dashboard/gps/${encodeURIComponent(vehicleRef || '')}`); }
            catch (error) { return { gps: null, message: 'GPS lookup unavailable.' }; }
        }

        function renderTrip(trip, gpsPayload) {
            const state = normalizeState(trip.status || trip.state);
            const destinations = Array.isArray(trip.destinations) ? trip.destinations : [];
            const journeyStart = trip.journey_start || 'TOP Factory';
            const journeyEnd = trip.journey_end || 'TOP Factory';
            const route = `${journeyStart} -> ${destinations[0] || trip.destination || 'DB destination pending'} -> ${journeyEnd}`;
            $('page-title').textContent = trip.vehicle_plate || trip.id;
            $('trip-heading').textContent = trip.vehicle_plate || trip.id;
            $('trip-route').textContent = route;
            $('trip-state').textContent = state;
            $('map-link').href = `/map.html?journey_id=${encodeURIComponent(trip.id)}&vehicle=${encodeURIComponent(trip.vehicle_plate || trip.vehicle_id || trip.id)}`;
            const revenue = Number(trip.total_revenue || 0);
            const expense = Number(trip.total_expense || 0);
            $('metrics').innerHTML = [
                ['Driver', trip.driver_name || 'Unassigned', ''],
                ['Journey Revenue', money(revenue), 'green'],
                ['Paid', money(trip.paid_amount), 'green'],
                ['Pending', money(trip.pending_payment), 'amber'],
                ['Journey Expense', money(expense), 'red'],
                ['Profit', money(revenue - expense), revenue - expense >= 0 ? 'green' : 'red'],
                ['Trips Inside', trip.trip_count || (Array.isArray(trip.trips) ? trip.trips.length : 1), ''],
                ['Return To', journeyEnd, ''],
            ].map(([label, value, tone]) => `
                <div class="metric"><div class="metric-label">${clean(label)}</div><div class="metric-value ${tone}">${clean(value)}</div></div>
            `).join('');
            renderTimeline(trip);
            renderLocationCompare(trip, gpsPayload);
            renderRoute(trip);
            refreshIcons();
        }

        function buildTimeline(trip) {
            const legs = Array.isArray(trip.trips) ? trip.trips : [];
            if (!legs.length) {
                const destination = Array.isArray(trip.destinations) && trip.destinations.length ? trip.destinations[0] : trip.destination;
                return [
                    { title: trip.journey_start || trip.origin || 'TOP Factory', meta: trip.departure_date || 'Not set', note: `Journey opened toward ${destination || 'destination pending'}` },
                    { title: trip.journey_end || 'TOP Factory', meta: trip.return_date || 'Pending', note: `Journey ends when vehicle returns to ${trip.journey_end || 'TOP Factory'}` },
                ];
            }
            return legs.flatMap((leg) => {
                const entries = [{ title: leg.origin || trip.origin || 'TOP Factory', meta: leg.departure_date || trip.departure_date || 'Not set', note: `Trip leg toward ${leg.destination || 'destination'} · Revenue ${money(leg.revenue || 0)} · Expense ${money(leg.expense || 0)}` }];
                if (leg.arrival_date) entries.push({ title: leg.destination || 'Destination', meta: leg.arrival_date, note: `Arrived after ${leg.distance_km || 0} km` });
                return entries;
            }).concat([{ title: trip.journey_end || 'TOP Factory', meta: trip.return_date || 'Pending', note: `Return to ${trip.journey_end || 'TOP Factory'}` }]);
        }

        function renderTimeline(trip) {
            const entries = buildTimeline(trip);
            $('timeline').innerHTML = entries.map((entry) => `
                <div class="timeline-entry">
                    <div class="dot"></div>
                    <div class="timeline-card"><strong>${clean(entry.title)}</strong><span>${clean(entry.meta)} · ${clean(entry.note)}</span></div>
                </div>
            `).join('');
        }

        function renderLocationCompare(trip, gpsPayload) {
            const dbLocation = trip.current_location || (Array.isArray(trip.destinations) ? trip.destinations[0] : trip.destination) || trip.current_location_note || 'DB location pending';
            const gps = gpsPayload && gpsPayload.gps;
            const gpsLocation = gps ? [gps.location, gps.address, gps.latitude && gps.longitude ? `${gps.latitude}, ${gps.longitude}` : ''].filter(Boolean).join(' · ') : 'No cached Mayet GPS position';
            const diff = gps && dbLocation && gpsLocation && !gpsLocation.toLowerCase().includes(String(dbLocation).toLowerCase());
            $('location-compare').innerHTML = `
                <div class="compare-row"><div class="compare-label">DB Location</div><div>${clean(dbLocation)}</div></div>
                <div class="compare-row"><div class="compare-label">GPS Location</div><div>${clean(gpsLocation)}</div></div>
                <div class="compare-row"><div class="compare-label">Difference</div><div class="${diff ? 'red' : 'green'}">${diff ? 'GPS and DB location differ' : (gps ? 'GPS matches DB context' : 'Waiting for Mayet GPS cache')}</div></div>
                <div class="compare-row"><div class="compare-label">Mayet</div><div><a class="btn" href="${clean((gpsPayload && gpsPayload.mayet_url) || 'https://mayetgps.com/')}" target="_blank" rel="noreferrer">Open Mayet</a></div></div>
            `;
        }

        function renderRoute(trip) {
            const legs = Array.isArray(trip.trips) ? trip.trips : [];
            $('route-summary').innerHTML = legs.length ? legs.map((leg) => `
                <div class="compare-row"><div class="compare-label">Trip ${clean(leg.id || '')}</div><div>${clean(leg.origin || 'Origin')} -> ${clean(leg.destination || 'Destination')} · Revenue ${money(leg.revenue || 0)} · Expense ${money(leg.expense || 0)}</div></div>
            `).join('') : `<div class="compare-row"><div class="compare-label">Journey</div><div>${clean(trip.journey_start || trip.origin || 'TOP Factory')} -> ${clean(Array.isArray(trip.destinations) ? trip.destinations.join(', ') : trip.destination || 'Destination pending')} -> ${clean(trip.journey_end || 'TOP Factory')}</div></div>`;
        }

        function showEmpty(message) {
            document.querySelector('.page').innerHTML = `<div class="panel"><div class="empty">${clean(message)}</div></div>`;
        }

        $('theme-toggle').addEventListener('click', () => {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('fleetTheme', currentTheme);
            applyTheme();
        });

        applyTheme();
        loadTrip();
    </script>
</body>
</html>
