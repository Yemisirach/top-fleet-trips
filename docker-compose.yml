services:
  fleet-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8004:8004"
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

  snapshot-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    command: >
      sh -c "while true; do python workers/snapshot_builder.py || true; sleep 60; done"
    depends_on:
      - redis
      - fleet-api
    restart: unless-stopped

  gps-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    command: >
      sh -c "while true; do python workers/mayet_scraper.py || true; sleep 30; done"
    depends_on:
      - redis
      - fleet-api
    restart: unless-stopped

  sync-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    command: >
      sh -c "while true; do python workers/sync.py || true; sleep 120; done"
    depends_on:
      - redis
      - fleet-api
    restart: unless-stopped

volumes:
  redis_data:
