services:
  fleet-api:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://testbed_user:testbed%40321@100.121.12.65:5432/Testbed
      - ODOO_DATABASE_URL=postgresql://testbed_user:testbed%40321@100.121.12.65:5432/Testbed
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8004:8004"
    depends_on:
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8004

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  snapshot-worker:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://testbed_user:testbed%40321@100.121.12.65:5432/Testbed
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    command: python -c "print('snapshot worker running')"

volumes:
  redis_data: